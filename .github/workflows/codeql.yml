name: "CodeQL"

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          # Exclude rust/cleartext-logging — false positive: connection_info()
          # formats host/port/user/dbname but never reads the password field.
          # CodeQL's Rust taint analysis is not field-sensitive enough to see
          # this; it taints the entire ConnParams struct.
          config: |
            query-filters:
              - exclude:
                  id: rust/cleartext-logging

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
