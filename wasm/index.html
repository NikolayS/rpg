<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>rpg — browser terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #1a1a1a; color: #d4d4d4; font-family: monospace; display: flex; flex-direction: column; height: 100vh; }
    #toolbar {
      background: #252526; border-bottom: 1px solid #333; padding: 8px 12px;
      display: flex; gap: 8px; align-items: center; flex-wrap: wrap; flex-shrink: 0;
    }
    #toolbar label { color: #9cdcfe; font-size: 12px; }
    #toolbar input {
      background: #1e1e1e; border: 1px solid #444; color: #d4d4d4;
      padding: 4px 8px; border-radius: 3px; font-family: monospace; font-size: 12px;
    }
    #toolbar button {
      background: #0e639c; color: #fff; border: none; padding: 4px 14px;
      border-radius: 3px; cursor: pointer; font-family: monospace; font-size: 12px;
    }
    #toolbar button:hover { background: #1177bb; }
    #toolbar button:disabled { background: #444; cursor: default; }
    #status { font-size: 11px; margin-left: auto; }
    #status.connected { color: #4ec9b0; }
    #status.error { color: #f48771; }
    #terminal-container { flex: 1; padding: 4px; overflow: hidden; }
  </style>
</head>
<body>
  <div id="toolbar">
    <label>ws-proxy</label>
    <input id="ws-url" value="ws://localhost:9091" size="26">
    <label>database</label>
    <input id="db" value="testdb" size="12">
    <label>user</label>
    <input id="user" value="testuser" size="10">
    <label>password</label>
    <input id="password" type="password" size="10">
    <button id="connect-btn">Connect</button>
    <span id="status">disconnected</span>
  </div>
  <div id="terminal-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
  <script type="module">
    import init, { run_rpg } from './pkg/rpg.js';

    const term = new Terminal({
      cursorBlink: true,
      fontFamily: '"Cascadia Code", "Fira Code", "Courier New", monospace',
      fontSize: 14,
      theme: {
        background: '#0d0d0d',
        foreground: '#d4d4d4',
        cursor: '#4ec9b0',
        selectionBackground: '#264f78',
        black: '#1e1e1e', red: '#f44747', green: '#6a9955',
        yellow: '#dcdcaa', blue: '#569cd6', magenta: '#c586c0',
        cyan: '#4ec9b0', white: '#d4d4d4',
        brightBlack: '#808080', brightRed: '#f48771', brightGreen: '#89d185',
        brightYellow: '#d7ba7d', brightBlue: '#9cdcfe', brightMagenta: '#d19a66',
        brightCyan: '#56b6c2', brightWhite: '#ffffff',
      },
    });

    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal-container'));
    fitAddon.fit();
    window.addEventListener('resize', () => fitAddon.fit());

    const status = document.getElementById('status');
    const connectBtn = document.getElementById('connect-btn');

    // Intercept console.log/warn/error → xterm output.
    // Rust's web_sys::console::log_1 calls console.log.
    const origLog   = console.log.bind(console);
    const origWarn  = console.warn.bind(console);
    const origError = console.error.bind(console);

    // Prompt lines (e.g. "postgres=> ", "mydb~# ") should not get a
    // trailing newline so the cursor stays on the same line for input.
    const isPrompt = (s) => /^[a-zA-Z_][\w]*[=#\-~!*]>\s*$/.test(s);

    console.log = (...a) => {
      origLog(...a);
      const text = a.join(' ');
      // Detect connection success and update toolbar status.
      if (text.includes('connected to')) {
        status.textContent = 'connected';
        status.className   = 'connected';
      }
      if (isPrompt(text)) {
        lastPrompt = text;
        term.write(text);
      } else {
        term.writeln(text);
      }
    };
    console.warn = (...a) => {
      origWarn(...a);
      const text = a.join(' ');
      if (isPrompt(text)) {
        term.write('\x1b[33m' + text + '\x1b[0m');
      } else {
        term.writeln('\x1b[33m' + text + '\x1b[0m');
      }
    };
    console.error = (...a) => {
      origError(...a);
      const text = a.join(' ');
      if (isPrompt(text)) {
        term.write('\x1b[31m' + text + '\x1b[0m');
      } else {
        term.writeln('\x1b[31m' + text + '\x1b[0m');
      }
    };

    // Line editing state for xterm.js keystrokes.
    let lineBuffer = '';
    let cursorPos = 0;        // cursor position within lineBuffer
    const history = [];       // command history
    let historyIdx = -1;      // -1 = not browsing history
    let savedLine = '';       // line saved when entering history browse

    // Redraw the line from the current prompt position.
    function redrawLine() {
      // Clear from start of input to end of line, rewrite buffer, reposition cursor.
      // \x1b[?K = erase to end of line; \r moves to column 0.
      // We need to move back to the start of user input, so we erase the
      // entire current line content and rewrite.
      const eraseLen = lineBuffer.length + 10; // generous
      term.write('\x1b[2K\r');  // clear entire line, carriage return

      // Re-emit the prompt.  We don't know the exact prompt text, so we ask
      // the Rust side... but we can't.  Instead, store the last prompt.
      term.write(lastPrompt + lineBuffer);

      // Position cursor within the line.
      const charsAfter = lineBuffer.length - cursorPos;
      if (charsAfter > 0) {
        term.write(`\x1b[${charsAfter}D`);  // move cursor left
      }
    }

    // Track the last prompt so we can redraw after edits.
    let lastPrompt = 'postgres=> ';

    // Update lastPrompt whenever a prompt line is detected.
    const origConsoleLogForPrompt = console.log;
    const _origLogRef = origConsoleLogForPrompt; // keep reference

    term.onKey(({ key, domEvent }) => {
      if (!window.rpgLineSender) return; // not connected yet

      if (domEvent.key === 'Enter') {
        term.writeln('');
        const line = lineBuffer;
        if (line.trim().length > 0) {
          history.push(line);
        }
        historyIdx = -1;
        window.rpgLineSender.push_line(line);
        lineBuffer = '';
        cursorPos = 0;
      } else if (domEvent.key === 'Backspace') {
        if (cursorPos > 0) {
          lineBuffer = lineBuffer.slice(0, cursorPos - 1) + lineBuffer.slice(cursorPos);
          cursorPos--;
          redrawLine();
        }
      } else if (domEvent.key === 'Delete') {
        if (cursorPos < lineBuffer.length) {
          lineBuffer = lineBuffer.slice(0, cursorPos) + lineBuffer.slice(cursorPos + 1);
          redrawLine();
        }
      } else if (domEvent.key === 'ArrowLeft') {
        if (cursorPos > 0) {
          cursorPos--;
          term.write('\x1b[D');
        }
      } else if (domEvent.key === 'ArrowRight') {
        if (cursorPos < lineBuffer.length) {
          cursorPos++;
          term.write('\x1b[C');
        }
      } else if (domEvent.key === 'ArrowUp') {
        if (history.length === 0) return;
        if (historyIdx === -1) {
          savedLine = lineBuffer;
          historyIdx = history.length - 1;
        } else if (historyIdx > 0) {
          historyIdx--;
        } else {
          return; // at oldest
        }
        lineBuffer = history[historyIdx];
        cursorPos = lineBuffer.length;
        redrawLine();
      } else if (domEvent.key === 'ArrowDown') {
        if (historyIdx === -1) return;
        if (historyIdx < history.length - 1) {
          historyIdx++;
          lineBuffer = history[historyIdx];
        } else {
          historyIdx = -1;
          lineBuffer = savedLine;
        }
        cursorPos = lineBuffer.length;
        redrawLine();
      } else if (domEvent.key === 'Home' || (domEvent.ctrlKey && domEvent.key === 'a')) {
        if (cursorPos > 0) {
          term.write(`\x1b[${cursorPos}D`);
          cursorPos = 0;
        }
      } else if (domEvent.key === 'End' || (domEvent.ctrlKey && domEvent.key === 'e')) {
        const move = lineBuffer.length - cursorPos;
        if (move > 0) {
          term.write(`\x1b[${move}C`);
          cursorPos = lineBuffer.length;
        }
      } else if (domEvent.ctrlKey && domEvent.key === 'u') {
        // Clear line before cursor.
        lineBuffer = lineBuffer.slice(cursorPos);
        cursorPos = 0;
        redrawLine();
      } else if (domEvent.ctrlKey && domEvent.key === 'k') {
        // Clear line after cursor.
        lineBuffer = lineBuffer.slice(0, cursorPos);
        redrawLine();
      } else if (domEvent.ctrlKey && domEvent.key === 'w') {
        // Delete word before cursor.
        const before = lineBuffer.slice(0, cursorPos);
        const trimmed = before.replace(/\s+$/, '');
        const lastSpace = trimmed.lastIndexOf(' ');
        const newPos = lastSpace === -1 ? 0 : lastSpace + 1;
        lineBuffer = lineBuffer.slice(0, newPos) + lineBuffer.slice(cursorPos);
        cursorPos = newPos;
        redrawLine();
      } else if (domEvent.ctrlKey && domEvent.key === 'l') {
        // Clear screen.
        term.clear();
        redrawLine();
      } else if (domEvent.ctrlKey && domEvent.key === 'd') {
        if (lineBuffer.length === 0) {
          window.rpgLineSender.send_eof();
        }
        // Ctrl-D on non-empty line: ignore (matches readline behavior)
      } else if (key.length === 1 && !domEvent.ctrlKey && !domEvent.altKey && !domEvent.metaKey) {
        // Insert printable character at cursor position.
        lineBuffer = lineBuffer.slice(0, cursorPos) + key + lineBuffer.slice(cursorPos);
        cursorPos++;
        if (cursorPos === lineBuffer.length) {
          // Appending at end — just write the char.
          term.write(key);
        } else {
          // Inserting mid-line — redraw.
          redrawLine();
        }
      }
    });

    // Load the WASM module.
    term.writeln('Loading rpg.wasm...');
    await init();
    term.writeln('rpg.wasm loaded. Press \x1b[36mConnect\x1b[0m to start.');

    connectBtn.addEventListener('click', async () => {
      connectBtn.disabled = true;
      status.textContent  = 'connecting…';
      status.className    = '';

      const wsUrl = document.getElementById('ws-url').value.trim();
      const db    = document.getElementById('db').value.trim() || null;
      const user  = document.getElementById('user').value.trim() || null;
      const pass  = document.getElementById('password').value || null;

      try {
        await run_rpg(wsUrl, db, user, pass);
        status.textContent = 'disconnected';
        status.className   = '';
        connectBtn.disabled = false;
      } catch (err) {
        term.writeln('\x1b[31mError: ' + err + '\x1b[0m');
        status.textContent = 'error';
        status.className   = 'error';
        connectBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
